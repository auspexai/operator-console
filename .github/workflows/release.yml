name: Release

# Fires on version tags (e.g., v0.1.0). The tag is the trigger; the
# Maintainer is expected to push it from a state where the main-branch
# CI was green.
#
# Outputs a GitHub release with:
#   - auspexai_operator_console-<version>-py3-none-any.whl  (Python wheel)
#
# The operator console runs only on rage (not distributed to volunteers),
# so Sigstore signing and .deb packaging are omitted.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout source at tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # -- Frontend build --------------------------------------------------

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend (static export)
        run: pnpm build
        working-directory: frontend

      # -- Backend build ----------------------------------------------------

      - name: Copy frontend build into backend static dir
        run: |
          # Clear previous build output but PRESERVE the tracked .gitkeep.
          # `rm -rf .../static` would delete that tracked file, leaving the
          # working tree dirty — hatch-vcs then stamps a `.devN+g<sha>.d<date>`
          # version and the clean-release guard below (correctly) rejects it.
          # The copied build files are gitignored (`static/*`), so keeping
          # .gitkeep is enough to keep the tree clean. See version_provenance.md.
          dest=backend/src/auspexai_operator_console/static
          mkdir -p "$dest"   # defensive: never abort the build if the dir is missing (e.g. a
                             # local deploy accidentally rm -rf'd the tracked .gitkeep)
          find "$dest" -mindepth 1 -maxdepth 1 ! -name .gitkeep -exec rm -rf {} +
          cp -r frontend/build/. "$dest"/

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build Python wheel
        run: |
          uv build
          ls -la dist/
        working-directory: backend

      - name: Guard — version is a clean release matching the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls backend/dist/auspexai_operator_console-*.whl)
          BUILT_VERSION=$(basename "$WHEEL" | cut -d- -f2)
          echo "tag=$TAG_VERSION  built=$BUILT_VERSION"
          # Reject dev/local/dirty (e.g. 0.1.0.dev3+gSHA): hatch-vcs only emits a
          # clean X.Y.Z when HEAD is exactly the tag with a clean tree, so a
          # non-release artifact can never ship. version_provenance.md.
          if [ "$BUILT_VERSION" = "0.0.0" ] || ! printf '%s' "$BUILT_VERSION" | grep -qE '^[0-9]+(\.[0-9]+)+$'; then
            echo "::error::built version '$BUILT_VERSION' is not a clean release (dev/local/dirty, or 0.0.0 version-detection fallback) — the tag must be on HEAD with a clean tree."
            exit 1
          fi
          if [ "$BUILT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::built version '$BUILT_VERSION' != tag '$TAG_VERSION'."
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_ENV"

      # -- GitHub Release ---------------------------------------------------

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            backend/dist/auspexai_operator_console-*.whl
          body: |
            AuspexAI Operator Console ${{ env.version }}.

            ## Install

            ```bash
            pipx install auspexai_operator_console-${{ env.version }}-py3-none-any.whl
            ```
